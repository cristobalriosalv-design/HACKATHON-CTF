services:
  redis:
    image: redis:7-alpine
    container_name: eiatube_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - eiatube_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: eiatube_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - MEDIA_BASE_URL=
      - REDIS_URL=redis://redis:6379
    volumes:
      - eiatube_uploads:/app/uploads
    depends_on:
      - redis

  frontend:
    build:
      context: ./frontend
    container_name: eiatube_frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  eiatube_uploads:
  eiatube_redis:
